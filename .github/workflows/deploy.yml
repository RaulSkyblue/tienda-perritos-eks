name: Tienda Perritos CI/CD

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ACCOUNT_ID: 263113818776
  EKS_CLUSTER_NAME: perritos-eks
  IMAGE_TAG: eks-v1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build imágenes Docker
        run: |
          docker build -t tienda-frontend ./frontend
          docker build -t tienda-backend ./backend
          docker build -t tienda-db ./db

      - name: Tag imágenes para ECR
        run: |
          docker tag tienda-frontend:latest $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/tienda-frontend:$IMAGE_TAG
          docker tag tienda-backend:latest $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/tienda-backend:$IMAGE_TAG
          docker tag tienda-db:latest $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/tienda-db:$IMAGE_TAG

      - name: Push imágenes a ECR
        run: |
          docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/tienda-frontend:$IMAGE_TAG
          docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/tienda-backend:$IMAGE_TAG
          docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/tienda-db:$IMAGE_TAG

      - name: Conectar kubectl con EKS
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      - name: Aplicar manifiestos Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/mysql-secret.yaml
          kubectl apply -f k8s/mysql-deployment.yaml
          kubectl apply -f k8s/mysql-service.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/backend-hpa.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/frontend-hpa.yaml

      - name: Reiniciar despliegues
        run: |
          kubectl rollout restart deployment/tienda-backend -n tienda
          kubectl rollout restart deployment/tienda-frontend -n tienda

      - name: Validar rollout
        run: |
          kubectl rollout status deployment/tienda-backend -n tienda
          kubectl rollout status deployment/tienda-frontend -n tienda